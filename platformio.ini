[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs

lib_deps =
    bogde/HX711
    bblanchon/ArduinoJson
    ESP32Async/AsyncTCP
    ESP32Async/ESPAsyncWebServer

build_flags =
    -DCORE_DEBUG_LEVEL=3
